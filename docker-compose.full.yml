services:
  valkey:
    image: redis:7-alpine
    container_name: sep-valkey
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - valkey-data:/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: sep-backend
    restart: unless-stopped
    env_file:
      - .env.hotband
      - OANDA.env
    environment:
      VALKEY_URL: "${VALKEY_URL:-redis://valkey:6379/0}"
      STRATEGY_PROFILE: /app/config/mean_reversion_strategy.yaml
      LIVE_ENABLE_ML_GATE: "0"
      EXPOSURE_SCALE: "0.02"
      PORTFOLIO_NAV_RISK_PCT: "0.01"
      PM_MAX_PER_POS_PCT: "0.01"
      PM_ALLOC_TOP_K: "32"
      ALLOC_TOP_K: "32"
      RISK_MAX_TOTAL_POSITIONS: "32"
      RISK_MAX_POSITIONS_PER_PAIR: "5"
      RISK_MAX_NET_UNITS_PER_PAIR: "40000"
      PORTFOLIO_RECONCILE_SECONDS: "30"
      TRADE_ENTRY_COOLDOWN_SECONDS: "60"
      OANDA_ATTACH_BRACKET_ORDERS: "0"
      SIGNAL_EVIDENCE_PATH: /app/output/evidence/outcome_weekly_costs.json
      ROC_REGIME_SUMMARY_PATH: /app/output/evidence/roc_regime_summary.json
      PYTHONPATH: /app
    volumes:
      - ./scripts:/app/scripts:ro
      - ./scripts/research:/app/scripts/research:ro
      - ./config:/app/config:ro
      - ./output:/app/output
      - ./logs/backend:/app/logs
    depends_on:
      - valkey
    ports:
      - "8000:8000"
    command: ["python3", "/app/scripts/trading_service.py"]

  regime:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: sep-regime
    restart: unless-stopped
    env_file:
      - .env.hotband
      - OANDA.env
    environment:
      VALKEY_URL: "${VALKEY_URL:-redis://valkey:6379/0}"
      STRATEGY_PROFILE: /app/config/mean_reversion_strategy.yaml
      HOTBAND_PAIRS: "${HOTBAND_PAIRS:-EUR_USD,USD_JPY,AUD_USD,USD_CHF,NZD_USD,GBP_USD,USD_CAD}"
      REGIME_PROM_PORT: "${REGIME_PROM_PORT:-9105}"
      REGIME_WINDOW_CANDLES: "${REGIME_WINDOW_CANDLES:-16}"
      REGIME_STRIDE_CANDLES: "${REGIME_STRIDE_CANDLES:-1}"
      REGIME_LOOP_SECONDS: "${REGIME_LOOP_SECONDS:-2.0}"
      PYTHONPATH: /app
    volumes:
      - ./scripts:/app/scripts:ro
      - ./scripts/research:/app/scripts/research:ro
      - ./config:/app/config:ro
      - ./logs/backend:/app/logs
    depends_on:
      - valkey
    ports:
      - "9105:9105"
    command: ["python3", "/app/scripts/trading/regime_manifold_service.py"]

  frontend:
    build:
      context: ./apps/frontend
    container_name: sep-frontend
    restart: unless-stopped
    environment:
      API_URL: "https://mxbikes.xyz"
      SERVER_NAME: "mxbikes.xyz"
      BACKEND_UPSTREAM: "http://backend:8000"
      WS_UPSTREAM: "http://backend:8000"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - backend

  streamer:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: sep-streamer
    restart: unless-stopped
    env_file:
      - .env.hotband
      - OANDA.env
    environment:
      VALKEY_URL: "${VALKEY_URL:-redis://valkey:6379/0}"
      HOTBAND_PAIRS: "${HOTBAND_PAIRS:-EUR_USD,USD_JPY,AUD_USD,USD_CHF,NZD_USD,GBP_USD,USD_CAD}"
      CANDLE_STREAM_INTERVAL: "${CANDLE_STREAM_INTERVAL:-2}"
      CANDLE_STREAM_RECENT_COUNT: "${CANDLE_STREAM_RECENT_COUNT:-180}"
      CANDLE_STREAM_MAX_ENTRIES: "${CANDLE_STREAM_MAX_ENTRIES:-5000}"
      PYTHONPATH: /app
    volumes:
      - ./scripts:/app/scripts:ro
      - ./config:/app/config:ro
    depends_on:
      - valkey
    command:
      - "/bin/sh"
      - "-c"
      - >-
        python3 /app/scripts/tools/stream_candles.py
        --redis "${VALKEY_URL:-redis://valkey:6379/0}"
        --granularity "${CANDLE_STREAM_GRANULARITY:-S5}"
        --interval "${CANDLE_STREAM_INTERVAL:-2}"
        --recent-count "${CANDLE_STREAM_RECENT_COUNT:-180}"
        --max-entries "${CANDLE_STREAM_MAX_ENTRIES:-5000}"
        --instruments "${HOTBAND_PAIRS:-EUR_USD,USD_JPY,AUD_USD,USD_CHF,NZD_USD,GBP_USD,USD_CAD}"

volumes:
  valkey-data:
    driver: local
