global:
  direction: momentum
  min_repetitions: 3
  hazard_max: 1.0
  hazard_exit_threshold: 0.60
  exit_horizon: 120
  session_exit_minutes: 5
  margin_hyst_high: 0.30
  regime_filter: []
  # CRITICAL: Disable confidence filter for synthetic backtesting
  min_regime_confidence: 0.0 
  guard_thresholds:
    min_coherence: 0.0
    min_stability: 0.0
    max_entropy: 4.0

