# HTTPS server block (templated)
server {
    listen 443 ssl;
    http2 on;
    server_name mxbikes.xyz;

    # SSL configuration
    ssl_certificate /etc/letsencrypt/live/mxbikes.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mxbikes.xyz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # Dynamic DNS resolution for Docker service names
    resolver 127.0.0.11 valid=30s ipv6=off;
    # Upstream variables force runtime DNS resolution
    set $backend_upstream http://backend:8000;
    set $ws_upstream http://websocket:8001;

    root /usr/share/nginx/html;
    index index.html index.htm;

    include /etc/nginx/includes/security_headers_https.conf;
    include /etc/nginx/includes/cache_static.conf;

    # API proxy to backend service
    location = /api/metrics { return 403; }
    include /etc/nginx/includes/api_proxy.conf;

    # WebSocket proxy to websocket service
    include /etc/nginx/includes/ws_proxy.conf;

    # React Router support
    include /etc/nginx/includes/react_router.conf;

    # Health check
    include /etc/nginx/includes/health.conf;
}

# HTTPS redirect for www -> apex
server {
    listen 443 ssl;
    http2 on;
    server_name www.mxbikes.xyz;

    ssl_certificate /etc/letsencrypt/live/mxbikes.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mxbikes.xyz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    return 301 https://mxbikes.xyz$request_uri;
}

# HTTP to HTTPS redirect for the canonical domain
server {
    listen 80;
    server_name mxbikes.xyz;

    location ^~ /.well-known/acme-challenge/ {
        alias /var/www/certbot/.well-known/acme-challenge/;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTP redirect for www -> apex
server {
    listen 80;
    server_name www.mxbikes.xyz;

    location ^~ /.well-known/acme-challenge/ {
        alias /var/www/certbot/.well-known/acme-challenge/;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://mxbikes.xyz$request_uri;
    }
}

# Catch-all HTTP server for localhost/other
server {
    listen 80 default_server;
    server_name _ localhost;
    resolver 127.0.0.11 valid=30s ipv6=off;
    set $backend_upstream http://backend:8000;
    set $ws_upstream http://websocket:8001;
    root /usr/share/nginx/html;
    index index.html index.htm;
    include /etc/nginx/includes/security_headers_http.conf;
    include /etc/nginx/includes/cache_static.conf;

    location ^~ /.well-known/acme-challenge/ {
        alias /var/www/certbot/.well-known/acme-challenge/;
        default_type "text/plain";
        try_files $uri =404;
    }

    location = /api/metrics { return 403; }
    include /etc/nginx/includes/api_proxy.conf;
    include /etc/nginx/includes/ws_proxy.conf;
    include /etc/nginx/includes/react_router.conf;
    include /etc/nginx/includes/health.conf;
}
