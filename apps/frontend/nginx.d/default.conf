# Minimal HTTP server for local testing
server {
    listen 80 default_server;
    server_name _ localhost;

    resolver 127.0.0.11 valid=30s ipv6=off;
    set $backend_upstream http://backend:8000;
    set $ws_upstream http://websocket:8001;

    root /usr/share/nginx/html;
    index index.html index.htm;

    include /etc/nginx/includes/security_headers_http.conf;
    include /etc/nginx/includes/cache_static.conf;
    include /etc/nginx/includes/api_proxy.conf;
    include /etc/nginx/includes/ws_proxy.conf;
    include /etc/nginx/includes/react_router.conf;
    include /etc/nginx/includes/health.conf;
}
